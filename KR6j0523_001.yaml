body:
  text: 先欲作印可入釋迦定印一道場印二手檀慧內相交以二水環各以二空押二火甲餘度相拄頭即成明二十八品二法華印以二水二火內相叉以檀度押力頭以風押智以禪捻慧即成呪曰菱印也薩嚩達摩奔荼梨伽安爾曼爾三羅剎二手各以水鉤火背又以空掘水甲以右風押左慧即以右火押左力頭又以右檀押左願即成呪曰怛姪他弭履弭履母樓母樓護娑婆賀四以前印以左於上即成呪曰怛儞也他弭履弭履母護娑婆賀五以先印各各別相背以檀慧相向又以右風鉤左力即成呪曰唵八萬金剛童子迦那迦那護蘇護蘇罰罰罰向鬼門雷電被打印也六羅剎縛印以前印即以大指相交二水間二地指押上又以無二風屈頭鉤押空頭成呪曰伊徥履云云如經説任理頌羅剎呪也七修多羅藏印二手外二火相交以二水鉤上又以二空頭相拄二地交內入呪曰八羅剎護法華藏印二手各自火後越以二水鉤風指相交又各二地二空理環成連集呪曰唵弊孕鑁友吒他本蓮華也九羅剎微塵陀落印二手各以二火鉤水背上即左右相搏取又持右地押左力度面又右風押左智上以左慧押右禪上成呪曰唵呪罰智莎呵十天地魔目大縛印左手覆右手仰即以右地各勾左慧叉以右水勾左願即各以空鎖連背合以右火勾左方度又各以風相合成呪曰唵莊叶都羅縛𮯊縛𮯊都禁縛禁嚩惡惡十羅剎形樣藍婆形如藥叉衣色青右手獨股當右肩左手持念珠即立左膝當居彼上面肉色也毗藍婆形如龍王如圓滿月也如向大海右手把風雲左手把念珠也衣色碧緑也面色白前立鏡臺也曲齒形如天女仙衣色青面伏低前捧香花長跪居半跏坐也花齒形如尼女衣色紫色也右手把花左手把花盤面少低也黑齒形如神女衣色都妙色也右手取叉左手軍持也猶如守護之形半跏坐也多髮形如童子滿月肉色乾達女右手銅環取左手如舞長跪居也無厭足形如頂經之形恆守護衣色淺𭈦也持瓔珞形如吉祥天女左右之手持瓔珞也衣色金也面色肉色結跏趺坐也白幸帝形如頂鳴女形衣色紅青也右手把裳左手持獨股如打物形立膝居也奪一切衣衆生精氣形如梵王帝釋女帶鎧伏甲出頂馬頭他忿怒形右手持杵左手持三股衣色棶雜色也結跏趺坐也八羅剎呪曰唵帝履帝履𥤦𥤦醯醯比吽鑁吽發吒十羅剎八龍王攝印護身呪難陀拔難陀等部類眷屬皆護我可言加加加序品方便譬喻品信解藥草授記品化城五百弟子品授學無學法師品多寶佛塔提婆品勸持安樂踊出品如來壽量分別品隨喜法師功德品不輕神力囑纍品藥王妙音菩薩品普門陀羅尼嚴王品普賢菩薩勸發品已上呪十羅剎本心呪曰唵怛姪他唵伊致明一伊致明底明二盧弭盧弭三薩馱訶薩馱訶四薩婆𮧄婆呵又呪曰一唵縛羅陀縛特迷虎鉢娑呵二唵呵羅呵羅里醯娑呵三唵南陀吉羅尼莎呵四唵帝摩里帝摩里莎訶五唵鉢羅尼鉢羅尼尼陀里莎訶六唵俱及陀羅尼陀羅尼莎訶七唵娑里娑里迦羅帝迦羅帝莎呵八唵儞陀儞陀契陀契陀羅尼莎呵九唵百帝百帝真陀莎呵十唵室里鉢里可毗羅帝莎呵
